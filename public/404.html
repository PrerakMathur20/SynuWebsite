<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tokis</title>
    <script>
      // GitHub Pages SPA redirect: preserve path in sessionStorage, redirect to root
      var l = window.location;
      sessionStorage.setItem(
        'spa_redirect',
        l.pathname.slice(1) + (l.search || '') + (l.hash || '')
      );
      l.replace(l.origin + l.pathname.split('/').slice(0, 2).join('/') + '/?p=1');
    </script>
  </head>
  <body></body>
</html>
